<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>Token 面板</title>
  <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="%235b62f4"/><path d="M18 18h28v8H36v22h-8V26H18z" fill="white"/></svg>'>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --page: #eef7ff;
      --card: #ffffff;
      --text: #344357;
      --title: #526484;
      --info: #909399;
      --primary: #5668ee;
      --primary-soft: #409eff;
      --border: #dbdfea;
      --control: #dcdfe6;
      --topbar: #ffffff;
      --field-bg: #ffffff;
      --field-text: #606266;
      --field-arrow: #a8abb2;
      --menu-hover: #f5f7fa;
      --range-track: #e4e7ed;
      --switch-off: #dcdfe6;
      --meter-bg: #eef2f8;
      --notice-bg: #ecf5ff;
      --notice-border: #d9ecff;
      --notice-error-bg: #fef0f0;
      --notice-error-border: #fde2e2;
      --notice-text: #606266;
      --warning: #e6a23c;
      --icon: rgb(96, 98, 102);
      --icon-main: rgb(9, 194, 222);
      --overlay: rgba(238, 247, 255, .62);
      --shadow-soft: rgba(82, 100, 132, .18);
      --shadow-panel: rgba(38, 62, 100, .22);
      --chart-grid: rgba(82, 100, 132, .08);
      --chart-bg: #ffffff;
      --chart-text: #9aa7ba;
      --chart-line: #4096ff;
      --chart-fill: rgba(64, 158, 255, .18);
      --chart-dot: #4096ff;
      --status-bg: #f0f9eb;
      --running-bg: #ecf5ff;
      --danger: #e85347;
      --success: #67c23a;
      --radius-round: 20px;
      font-family: "Segoe UI", "Microsoft YaHei UI", "Microsoft YaHei", Arial, sans-serif;
    }

    html.dark {
      color-scheme: dark;
      --page: rgb(33, 34, 37);
      --card: rgb(18, 18, 18);
      --text: rgb(193, 206, 230);
      --title: rgb(193, 206, 230);
      --info: rgb(165, 167, 172);
      --border: rgb(61, 63, 66);
      --control: rgb(61, 63, 66);
      --topbar: rgb(18, 18, 18);
      --field-bg: rgb(24, 24, 24);
      --field-text: rgb(200, 200, 200);
      --field-arrow: rgb(165, 167, 172);
      --menu-hover: rgb(33, 34, 37);
      --range-track: rgb(61, 63, 66);
      --switch-off: rgb(61, 63, 66);
      --meter-bg: rgb(43, 45, 48);
      --notice-bg: rgb(24, 37, 52);
      --notice-border: rgb(45, 82, 118);
      --notice-error-bg: rgb(48, 28, 28);
      --notice-error-border: rgb(92, 49, 49);
      --notice-text: rgb(200, 200, 200);
      --warning: #d6a23f;
      --icon: rgb(165, 167, 172);
      --icon-main: rgb(30, 105, 131);
      --overlay: rgba(18, 18, 18, .66);
      --shadow-soft: rgba(0, 0, 0, .38);
      --shadow-panel: rgba(0, 0, 0, .48);
      --chart-grid: rgba(193, 206, 230, .08);
      --chart-bg: rgb(18, 18, 18);
      --chart-text: rgb(165, 167, 172);
      --chart-line: #409eff;
      --chart-fill: rgba(64, 158, 255, .12);
      --chart-dot: rgb(30, 105, 131);
      --status-bg: rgb(24, 43, 24);
      --running-bg: rgb(24, 37, 52);
    }

    @media (prefers-color-scheme: dark) {
      :root:not(.light) {
        color-scheme: dark;
        --page: rgb(33, 34, 37);
        --card: rgb(18, 18, 18);
        --text: rgb(193, 206, 230);
        --title: rgb(193, 206, 230);
        --info: rgb(165, 167, 172);
        --border: rgb(61, 63, 66);
        --control: rgb(61, 63, 66);
        --topbar: rgb(18, 18, 18);
        --field-bg: rgb(24, 24, 24);
        --field-text: rgb(200, 200, 200);
        --field-arrow: rgb(165, 167, 172);
        --menu-hover: rgb(33, 34, 37);
        --range-track: rgb(61, 63, 66);
        --switch-off: rgb(61, 63, 66);
        --meter-bg: rgb(43, 45, 48);
        --notice-bg: rgb(24, 37, 52);
        --notice-border: rgb(45, 82, 118);
        --notice-error-bg: rgb(48, 28, 28);
        --notice-error-border: rgb(92, 49, 49);
        --notice-text: rgb(200, 200, 200);
        --warning: #d6a23f;
        --icon: rgb(165, 167, 172);
        --icon-main: rgb(30, 105, 131);
        --overlay: rgba(18, 18, 18, .66);
        --shadow-soft: rgba(0, 0, 0, .38);
        --shadow-panel: rgba(0, 0, 0, .48);
        --chart-grid: rgba(193, 206, 230, .08);
        --chart-bg: rgb(18, 18, 18);
        --chart-text: rgb(165, 167, 172);
        --chart-line: #409eff;
        --chart-fill: rgba(64, 158, 255, .12);
        --chart-dot: rgb(30, 105, 131);
        --status-bg: rgb(24, 43, 24);
        --running-bg: rgb(24, 37, 52);
      }
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      min-width: 320px;
      margin: 0;
      overflow: hidden;
      color: var(--text);
      background: var(--page);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled,
    input:disabled,
    select:disabled {
      cursor: not-allowed;
      opacity: .62;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    a {
      color: var(--info);
      text-decoration: none;
    }

    a:hover {
      color: var(--primary-soft);
    }

    .topbar {
      height: 67px;
      background-color: var(--topbar);
    }

    .top-notice {
      position: fixed;
      top: 14px;
      left: 50%;
      z-index: 50;
      display: inline-flex;
      max-width: min(360px, calc(100vw - 40px));
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border: 1px solid var(--notice-border);
      border-radius: 999px;
      background: var(--notice-bg);
      color: var(--primary-soft);
      box-shadow: 0 14px 40px var(--shadow-soft);
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -18px);
      will-change: transform, opacity;
    }

    .top-notice.is-visible {
      animation: topNoticeFlow 2s ease forwards;
    }

    .top-notice.is-error {
      border-color: var(--notice-error-border);
      background: var(--notice-error-bg);
      color: var(--danger);
    }

    .top-notice-title {
      flex: 0 0 auto;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.1;
    }

    .top-notice-text {
      min-width: 0;
      overflow: hidden;
      color: var(--notice-text);
      font-size: 12px;
      line-height: 1.15;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    @keyframes topNoticeFlow {
      0% {
        opacity: 0;
        transform: translate(-50%, -18px);
      }
      14% {
        opacity: 1;
        transform: translate(-50%, 0);
      }
      68% {
        opacity: 1;
        transform: translate(-50%, 0);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, 0);
      }
    }

    .header-inner {
      display: flex;
      width: 100%;
      height: 100%;
      align-items: flex-start;
      justify-content: space-between;
      padding: 15px 20px 12px;
    }

    .brand {
      display: flex;
      min-width: 0;
      align-items: center;
      gap: 8px;
    }

    .brand h1 {
      overflow: hidden;
      color: var(--title);
      font-size: 20px;
      font-weight: bolder;
      line-height: 40px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .brand-mark {
      display: grid;
      width: 40px;
      height: 40px;
      flex: 0 0 auto;
      place-items: center;
      border-radius: 20%;
      background-color: var(--primary);
    }

    .brand-mark svg {
      width: 30px;
      height: 30px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
      margin-top: 5px;
    }

    .home {
      display: inline-flex;
      min-height: 32px;
      padding: 0 15px;
      border: 1px solid var(--control);
      border-radius: 999px;
      background: var(--field-bg);
      align-items: center;
      justify-content: center;
      color: var(--title);
      font-size: 12px;
      line-height: 30px;
      list-style: none;
    }

    .theme-toggle {
      width: 32px;
      min-width: 32px;
      padding: 0;
    }

    .theme-toggle svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
      stroke-width: 1.8;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .theme-toggle .sun-icon {
      display: none;
    }

    html.dark .theme-toggle .sun-icon {
      display: block;
    }

    html.dark .theme-toggle .moon-icon {
      display: none;
    }

    .home::-webkit-details-marker,
    summary::-webkit-details-marker {
      display: none;
    }

    .page {
      display: grid;
      height: calc(100dvh - 67px);
      grid-template-rows: auto auto auto;
      align-content: start;
      gap: 8px;
      overflow: hidden;
      padding: 20px 10px 10px;
    }

    body.chart-open .page {
      overflow-y: auto;
    }

    .console,
    .info-card {
      width: min(850px, 100%);
      height: fit-content;
      margin: 0 auto;
      border-radius: var(--radius-round);
      background-color: var(--card);
      padding: 26px 34px 18px;
    }

    .settings {
      display: grid;
      gap: 8px;
    }

    .home-provider {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: 8px;
    }

    .title-row {
      display: flex;
      min-height: 22px;
      align-items: center;
      gap: 2px;
      margin-bottom: 3px;
    }

    .font-background {
      color: var(--text);
      font-size: 14px;
    }

    .input,
    .select {
      width: 100%;
      height: 32px;
      border: 1px solid var(--control);
      border-radius: 8px;
      outline: 0;
      background-color: var(--field-bg);
      color: var(--field-text);
      transition: border-color .18s ease, box-shadow .18s ease;
    }

    .input {
      padding: 0 11px;
    }

    .select {
      padding: 0 8px;
    }

    .input:focus,
    .select:focus {
      border-color: var(--primary-soft);
      box-shadow: 0 0 0 2px rgba(64, 158, 255, .12);
    }

    .split {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .mini-main,
    .mini-field {
      display: grid;
      gap: 5px;
      color: var(--text);
      font-size: 14px;
    }

    .mini-field {
      color: var(--field-text);
      font-size: 12px;
      font-weight: 600;
    }

    .model-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 7px;
    }

    .native-select {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
    }

    .select-widget {
      position: relative;
      min-width: 0;
    }

    .select-trigger {
      position: relative;
      display: flex;
      width: 100%;
      height: 32px;
      align-items: center;
      padding: 0 32px 0 11px;
      border: 1px solid var(--control);
      border-radius: 8px;
      background: var(--field-bg);
      color: var(--field-text);
      text-align: left;
      transition: border-color .18s ease, box-shadow .18s ease;
    }

    .select-trigger::after {
      content: "";
      position: absolute;
      top: 50%;
      right: 12px;
      width: 7px;
      height: 7px;
      border-right: 1.5px solid var(--field-arrow);
      border-bottom: 1.5px solid var(--field-arrow);
      transform: translateY(-65%) rotate(45deg);
      transition: transform .18s ease;
    }

    .select-widget.is-open .select-trigger,
    .select-trigger:focus {
      border-color: var(--primary-soft);
      box-shadow: 0 0 0 2px rgba(64, 158, 255, .12);
    }

    .select-widget.is-open .select-trigger::after {
      transform: translateY(-25%) rotate(225deg);
    }

    .select-value {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .select-menu {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      z-index: 35;
      display: none;
      width: 100%;
      max-height: 210px;
      overflow: auto;
      padding: 6px 0;
      border: 1px solid var(--control);
      border-radius: 8px;
      background: var(--field-bg);
      box-shadow: 0 4px 12px rgba(0, 0, 0, .12);
    }

    .select-widget.is-open .select-menu {
      display: block;
    }

    .select-option {
      display: block;
      width: 100%;
      min-height: 34px;
      padding: 0 16px;
      background: transparent;
      color: var(--field-text);
      text-align: left;
      line-height: 34px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .select-option:hover {
      background: var(--menu-hover);
    }

    .select-option.is-selected {
      color: var(--primary-soft);
      font-weight: 700;
    }

    .url-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(220px, 32%);
      align-items: end;
      gap: 7px;
    }

    .key-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      align-items: end;
      gap: 7px;
    }

    .tiny-btn {
      height: 32px;
      padding: 0 12px;
      border: 1px solid var(--control);
      border-radius: 8px;
      background: var(--field-bg);
      color: var(--primary-soft);
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    .thread-block {
      display: grid;
      gap: 7px;
      margin-top: 2px;
    }

    input[type="range"] {
      --slider-percent: 10.5%;
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 18px;
      margin: 0;
      border: 0;
      border-radius: 999px;
      outline: 0;
      background: transparent;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 6px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--primary-soft) 0 var(--slider-percent), var(--range-track) var(--slider-percent) 100%);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      margin-top: -7px;
      border: 2px solid var(--primary-soft);
      border-radius: 50%;
      background: var(--field-bg);
    }

    input[type="range"]::-moz-range-track {
      height: 6px;
      border-radius: 999px;
      background: var(--range-track);
    }

    input[type="range"]::-moz-range-progress {
      height: 6px;
      border-radius: 999px;
      background: var(--primary-soft);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border: 2px solid var(--primary-soft);
      border-radius: 50%;
      background: var(--field-bg);
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    .switches {
      display: flex;
      height: 32px;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .budget-control {
      display: inline-flex;
      min-width: 0;
      align-items: center;
      gap: 10px;
    }

    .switch-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      font-size: 14px;
      white-space: nowrap;
    }

    .budget-inline {
      display: inline-flex;
      height: 32px;
      align-items: center;
      overflow: hidden;
      border: 1px solid var(--control);
      border-radius: 999px;
      background: var(--field-bg);
      color: var(--field-text);
      font-size: 13px;
      white-space: nowrap;
    }

    .budget-inline.is-disabled {
      opacity: .58;
    }

    .budget-caption {
      padding: 0 10px 0 12px;
      color: var(--info);
    }

    .budget-input {
      width: 94px;
      height: 100%;
      flex: 0 0 94px;
      border: 0;
      border-left: 1px solid var(--control);
      border-radius: 0;
      background: transparent;
      text-align: center;
    }

    .switch {
      position: relative;
      width: 40px;
      height: 20px;
      flex: 0 0 auto;
    }

    .switch input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .track {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: var(--switch-off);
      transition: background .18s ease;
    }

    .track::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--field-bg);
      box-shadow: 0 2px 4px rgba(0, 0, 0, .18);
      transition: transform .18s ease;
    }

    .switch input:checked + .track {
      background: var(--primary-soft);
    }

    .switch input:checked + .track::after {
      transform: translateX(20px);
    }

    .ItemContainer {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-top: 10px;
    }

    .showItem {
      min-height: 104px;
      padding: 18px 15px 13px 24px;
      border: 1px solid var(--border);
      background: var(--card);
    }

    .showItem + .showItem {
      border-left: 0;
    }

    .metric-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      color: var(--text);
      font-size: 17px;
    }

    .state-icon {
      display: block;
      width: 40px;
      height: 24px;
      color: var(--icon);
    }

    .state-icon svg {
      width: 100%;
      height: 100%;
    }

    .state-icon-main {
      color: var(--icon-main);
    }

    .font-data {
      margin-top: 4px;
      overflow: hidden;
      color: var(--field-text);
      font-size: 28px;
      font-weight: 700;
      line-height: 2.2rem;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .metric-note {
      overflow: hidden;
      color: var(--info);
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .meter {
      height: 3px;
      margin-top: 7px;
      overflow: hidden;
      border-radius: 999px;
      background: var(--meter-bg);
    }

    .meter span {
      display: block;
      width: 0%;
      height: 100%;
      background: var(--primary-soft);
      transition: width .22s ease;
    }

    .action-zone {
      display: grid;
      justify-items: center;
      padding-top: 12px;
    }

    .main-action {
      position: relative;
      display: grid;
      width: 124px;
      height: 124px;
      place-items: center;
      border-radius: 50%;
      background-color: #485bed;
      background-image: linear-gradient(145deg, #485bed, #6576ff);
      color: #ffffff;
      box-shadow: 0 3px 8px #485bed, inset 0 2px 3px #6576ff;
      transition: transform .18s ease;
    }

    .main-action:hover {
      transform: translateY(-1px);
    }

    .main-action .play {
      width: 0;
      height: 0;
      margin-left: 9px;
      border-top: 22px solid transparent;
      border-bottom: 22px solid transparent;
      border-left: 34px solid currentColor;
    }

    .main-action .stop {
      position: relative;
      display: none;
      width: 52px;
      height: 52px;
    }

    .main-action .stop::before,
    .main-action .stop::after {
      content: "";
      position: absolute;
      top: 4px;
      width: 14px;
      height: 44px;
      border-radius: 4px;
      background: currentColor;
    }

    .main-action .stop::before {
      left: 8px;
    }

    .main-action .stop::after {
      right: 8px;
    }

    body.running .main-action {
      background-color: var(--danger);
      background-image: linear-gradient(145deg, #e85347, #f56c6c);
      box-shadow: 0 3px 8px rgba(232, 83, 71, .75), inset 0 2px 3px rgba(255, 255, 255, .2);
    }

    body.running .main-action .play {
      display: none;
    }

    body.running .main-action .stop {
      display: block;
    }

    .action-text {
      display: none;
    }

    .panel-tools {
      display: flex;
      height: 24px;
      align-items: center;
      justify-content: space-between;
      margin-top: -16px;
    }

    .tool-left {
      display: flex;
      gap: 32px;
    }

    .icon-link {
      display: inline-grid;
      width: 24px;
      height: 24px;
      place-items: center;
      padding: 0;
      background: transparent;
      color: var(--primary-soft);
      list-style: none;
    }

    .icon-link svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .tool-icon {
      width: 26px;
      height: 24px;
    }

    details {
      display: inline-grid;
      justify-items: center;
    }

    details[open] summary {
      color: var(--primary);
    }

    details[open]::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 19;
      background: var(--overlay);
      backdrop-filter: blur(2px);
    }

    .advanced {
      position: fixed;
      top: 50%;
      left: 50%;
      z-index: 20;
      display: grid;
      width: min(760px, calc(100vw - 24px));
      max-height: calc(100dvh - 48px);
      gap: 10px;
      overflow: auto;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--card);
      box-shadow: 0 22px 70px var(--shadow-panel);
      transform: translate(-50%, -50%);
    }

    .advanced-close {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 1;
      display: inline-grid;
      width: 28px;
      height: 28px;
      place-items: center;
      padding: 0;
      border: 1px solid transparent;
      border-radius: 4px;
      background: transparent;
      color: var(--info);
      transition: border-color .18s ease, background-color .18s ease, color .18s ease;
    }

    .advanced-close:hover {
      border-color: var(--notice-border);
      background: var(--notice-bg);
      color: var(--primary-soft);
    }

    .advanced-close svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
    }

    .advanced-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .prompt-field {
      grid-column: span 2;
    }

    .provider-row {
      --provider-index: 0;
      position: relative;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0;
      min-height: 34px;
      overflow: hidden;
      padding: 2px;
      border: 1px solid var(--control);
      border-radius: 999px;
      background: var(--field-bg);
    }

    .provider-row[data-active-index="1"] {
      --provider-index: 1;
    }

    .provider-row[data-active-index="2"] {
      --provider-index: 2;
    }

    .provider-thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: calc((100% - 4px) / 3);
      height: calc(100% - 4px);
      border-radius: 999px;
      background: var(--notice-bg);
      box-shadow: 0 0 0 1px var(--notice-border), 0 6px 18px var(--shadow-soft);
      transform: translateX(calc(var(--provider-index) * 100%));
      transition: transform .28s cubic-bezier(.22, 1, .36, 1), background-color .18s ease, box-shadow .18s ease;
    }

    .segment {
      position: relative;
      z-index: 1;
      min-height: 32px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--field-text);
      font-size: 13px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: color .18s ease, transform .18s ease;
    }

    .segment:hover {
      color: var(--primary-soft);
    }

    .segment.active {
      color: var(--primary-soft);
      transform: translateY(-1px);

      line-height: 1.5;

      justify-content: flex-end;

    .sparkline-panel {
      display: none;
      width: 100%;
      margin-top: 8px;
      background: var(--chart-bg);

    #liveChart {

    .info-card {

      max-height: 58px;
      align-items: center;
      justify-content: center;
      gap: 10px;
      overflow: hidden;

  <script>
    const THEME_STORAGE_KEY = "token-xiaohao-theme";
    const darkModeQuery = window.matchMedia("(prefers-color-scheme: dark)");
    let themePreference = localStorage.getItem(THEME_STORAGE_KEY) || "system";

    function applyTheme(preference = themePreference) {
      const useDark = preference === "dark" || (preference === "system" && darkModeQuery.matches);
      document.documentElement.classList.toggle("dark", useDark);
      document.documentElement.classList.toggle("light", preference === "light");
      themePreference = preference;
      if (preference === "system") localStorage.removeItem(THEME_STORAGE_KEY);
      else localStorage.setItem(THEME_STORAGE_KEY, preference);
      const toggle = document.getElementById("themeToggle");
      if (toggle) {
        toggle.setAttribute("aria-label", useDark ? "切换到浅色模式" : "切换到深色模式");
        toggle.setAttribute("title", useDark ? "切换到浅色模式" : "切换到深色模式");
      }
    }

    darkModeQuery.addEventListener("change", () => {
      if (themePreference === "system") applyTheme("system");
    });

    applyTheme(themePreference);
  </script>

    const defaults = {
      openai: {
        model: ""
      },
      claude: {
        model: ""
      },
      custom: {
        model: ""
      }
    };

    const state = {
      provider: "openai",
      running: false,
      aborter: null,
      nextId: 1,
      activeWorkers: 0,
      completed: 0,
      success: 0,
      failed: 0,
      totalTokens: 0,
      lastLatency: 0,
      latencies: [],
      samples: [],
      settings: {},
      noticeTimer: null,
      wakeLock: null,
      localProxyUsed: false,
      chart: null
    };

    function getBaseUrlValue() {
      const input = $("baseUrl");
      return input.value.trim() || input.placeholder.trim();
    }

    function getSettings() {
      return {
        provider: state.provider,
        budgetGuard: $("budgetGuard").checked,
        url: getBaseUrlValue(),
        apiKey: $("apiKey").value.trim(),
        model: $("modelName").value.trim(),
        temperature: Number($("temperature").value),
        maxTokens: Number($("maxTokens").value),
        rounds: Number($("rounds").value),
        concurrency: Number($("concurrency").value),
        tokenBudget: Number($("tokenBudget").value),
        intervalMs: Number($("intervalMs").value),
        prompt: $("promptText").value.trim()
      };
    }

    function setProvider(provider) {
      state.provider = provider;
      providerButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.provider === provider);
      });
      $("providerRow").dataset.activeIndex = String(Math.max(0, providerButtons.findIndex((button) => button.dataset.provider === provider)));
      $("modelName").value = defaults[provider].model;
      syncModelSelect();
      addEvent("Mode", `接口已切换为 ${provider === "openai" ? "OpenAI" : provider === "claude" ? "Anthropic" : "自定义"}`);
    }

    function validateSettings(settings) {
      if (!settings.url) return "请先填写 URL";
      try {
        new URL(settings.url);
      } catch {
        return "URL 格式不正确";
      }
      if (!settings.apiKey) return "请先填写 KEY";
      if (!settings.model) return "请先填写或选择模型 ID";
      if (!settings.prompt) return "提示词不能为空";
      if (!Number.isFinite(settings.rounds) || settings.rounds < 1) return "轮次必须大于 0";
      if (!Number.isFinite(settings.concurrency) || settings.concurrency < 1) return "线程数必须大于 0";
      if (!Number.isFinite(settings.tokenBudget) || settings.tokenBudget < 100) return "Token 预算至少为 100";
      if (!Number.isFinite(settings.maxTokens) || settings.maxTokens < 16) return "单次输出至少为 16";
      return "";
    }

    function buildModelUrl(url) {
      const parsed = new URL(url);
      const path = parsed.pathname.replace(/\/+$/, "");
      if (/\/chat\/completions$/i.test(path)) {
        parsed.pathname = path.replace(/\/chat\/completions$/i, "/models");
      } else if (/\/messages$/i.test(path)) {
        parsed.pathname = path.replace(/\/messages$/i, "/models");
      } else if (!/\/models$/i.test(path)) {
        parsed.pathname = path.endsWith("/v1") ? `${path}/models` : `${path}/v1/models`;
      }
      parsed.search = "";
      parsed.hash = "";
      return parsed.toString();
    }

    function buildCompletionUrl(url, provider) {
      const parsed = new URL(url);
      const path = parsed.pathname.replace(/\/+$/, "");
      parsed.search = "";
      parsed.hash = "";
      if (/\/chat\/completions$/i.test(path) || /\/messages$/i.test(path)) return parsed.toString();
      if (provider === "claude") {
        parsed.pathname = path.endsWith("/v1") ? `${path}/messages` : `${path}/v1/messages`;
      } else {
        parsed.pathname = path.endsWith("/v1") ? `${path}/chat/completions` : `${path}/v1/chat/completions`;
      }
      return parsed.toString();
    }

    function buildProxyUrl(proxyOrigin, targetUrl) {
      const url = new URL(proxyOrigin === window.location.origin ? "/proxy" : "/", proxyOrigin);
      url.searchParams.set("target", targetUrl);
      return url.toString();
    }

    function getProxyOrigins() {
      const origins = [window.location.origin, LOCAL_PROXY_ORIGIN];
      return [...new Set(origins.filter((origin) => /^https?:\/\//i.test(origin)))];
    }

    function isBrowserNetworkError(error) {
      const message = error && error.message ? error.message : String(error);
      return /Failed to fetch|NetworkError|Load failed/i.test(message);
    }

    async function fetchWithLocalProxy(targetUrl, options = {}) {
      try {
        return await fetch(targetUrl, options);
      } catch (error) {
        if (!isBrowserNetworkError(error)) throw error;
        let lastError = error;
        for (const proxyOrigin of getProxyOrigins()) {
          try {
            const response = await fetch(buildProxyUrl(proxyOrigin, targetUrl), options);
            const isProxyResponse = response.headers.get("x-token-xiaohao-proxy") === "1";
            if (isProxyResponse) {
              state.localProxyUsed = true;
              return response;
            }
          } catch (proxyError) {
            lastError = proxyError;
          }
        }
        throw lastError;
      }
    }

    async function fetchModels() {
      if (state.running) return;
      const settings = getSettings();
      if (!settings.url) {
        addEvent("Error", "请先填写 URL", true);
        return;
      }
      if (!settings.apiKey) {
        addEvent("Error", "获取模型需要填写 KEY", true);
        return;
      }

      $("fetchModelsBtn").disabled = true;
      $("fetchModelsBtn").textContent = "获取中";
      try {
        state.localProxyUsed = false;
        const response = await fetchWithLocalProxy(buildModelUrl(settings.url), {
          method: "GET",
          headers: buildHeadersFor(settings),
          signal: AbortSignal.timeout ? AbortSignal.timeout(15000) : undefined
        });
        const payload = await response.json().catch(() => null);
        if (!response.ok) {
          const detail = payload?.error?.message || payload?.message || response.statusText;
          throw new Error(`${response.status} ${detail}`);
        }
        const models = normalizeModels(payload);

        if (!models.length) throw new Error("没有解析到模型 ID");
        fillModelOptions(models);
        $("modelName").value = models[0];
        syncModelSelect();
        $("advancedPanel").open = false;
        addEvent("Models", state.localProxyUsed ? `本地代理已获取 ${models.length} 个模型` : `已获取 ${models.length} 个模型`);
      } catch (error) {
        const message = formatRequestError(error);
        addEvent("Error", `获取模型失败：${message}`, true);
      } finally {
        $("fetchModelsBtn").disabled = false;
        $("fetchModelsBtn").textContent = "获取模型";
      }
    }

    function normalizeModels(payload) {
      const list = Array.isArray(payload?.data) ? payload.data
        : Array.isArray(payload?.models) ? payload.models
        : Array.isArray(payload) ? payload
        : [];
      return [...new Set(list.map((item) => {
        if (typeof item === "string") return item;
        return item?.id || item?.name || item?.model || "";
      }).filter(Boolean))];
    }

    function fillModelOptions(models) {
      const options = models.length
        ? models.map((model) => `<option value="${escapeHtml(model)}">${escapeHtml(model)}</option>`).join("")
        : '<option value="">请先获取模型</option>';
      $("modelName").innerHTML = options;
      renderModelSelect();
    }

    function renderModelSelect() {
      const select = $("modelName");
      $("modelSelectMenu").innerHTML = Array.from(select.options).map((option) => `
        <button class="select-option ${option.selected ? "is-selected" : ""}" type="button" role="option" aria-selected="${option.selected ? "true" : "false"}" data-model="${escapeHtml(option.value)}">${escapeHtml(option.textContent)}</button>
      `).join("");
      syncModelSelect();
    }

    function syncModelSelect() {
      const selected = $("modelName").selectedOptions[0];
      const selectedText = selected && $("modelName").value ? selected.textContent : "请先获取模型";
      $("modelSelectValue").textContent = selectedText;
      Array.from($("modelSelectMenu").children).forEach((option) => {
        const isSelected = option.dataset.model === $("modelName").value;
        option.classList.toggle("is-selected", isSelected);
        option.setAttribute("aria-selected", isSelected ? "true" : "false");
      });
    }

    function closeModelSelect() {
      $("modelSelectWidget").classList.remove("is-open");
      $("modelSelectTrigger").setAttribute("aria-expanded", "false");
    }

    function formatRequestError(error) {
      const message = error && error.message ? error.message : String(error);
      if (message.includes(LOCAL_PROXY_ORIGIN)) {
        return "请先启动本地代理：node local-proxy.js，或使用 Docker 运行";
      }
      if (/Failed to fetch|NetworkError|Load failed/i.test(message)) {
        return "接口未开放浏览器 CORS，且代理不可用";
      }
      return message;
    }

    async function startRun() {
      if (state.running) return stopRun();
      const settings = getSettings();
      const validation = validateSettings(settings);
      if (validation) {
        addEvent("Error", validation, true);
        return;
      }

      state.settings = settings;
      state.running = true;
      state.aborter = new AbortController();
      state.nextId = 1;
      state.activeWorkers = 0;
      state.completed = 0;
      state.success = 0;
      state.failed = 0;
      state.totalTokens = 0;
      state.lastLatency = 0;
      state.latencies = [];
      state.samples = [];

      document.body.classList.add("running");
      $("runState").textContent = "真实运行中";
      $("mainAction").setAttribute("aria-label", "停止消耗");
      $("actionText").textContent = "停止消耗";
      setConfigDisabled(true);
      updateMetrics();
      drawChart();
      await enableBackgroundRun();
      addEvent("Start", `${settings.rounds} 轮 / ${settings.concurrency} 线程`);

      const workers = Array.from({ length: settings.concurrency }, (_, index) => runWorker(index + 1));
      await Promise.allSettled(workers);
      const stoppedByBudget = settings.budgetGuard && state.totalTokens >= settings.tokenBudget;
      finishRun(stoppedByBudget ? "达到预算" : "运行结束");
    }

    async function runWorker(workerId) {
      while (state.running) {
        const id = state.nextId++;
        const budgetHit = state.settings.budgetGuard && state.totalTokens >= state.settings.tokenBudget;
        if (id > state.settings.rounds || budgetHit) break;
        state.activeWorkers += 1;
        updateMetrics();

        try {
          const result = await realRequest(id);
          registerResult(id, true, result.tokens, result.latency, "");
        } catch (error) {
          const message = formatRequestError(error);
          registerResult(id, false, 0, state.lastLatency, message);
        } finally {
          state.activeWorkers -= 1;
          updateMetrics();
        }

        if (state.settings.intervalMs > 0) await sleep(state.settings.intervalMs);
      }
    }

    async function enableBackgroundRun() {
      if (!$("backgroundRun").checked || state.wakeLock || !("wakeLock" in navigator)) return;
      try {
        state.wakeLock = await navigator.wakeLock.request("screen");
        state.wakeLock.addEventListener("release", () => {
          state.wakeLock = null;
        });
      } catch {
        addEvent("Mode", "浏览器不支持保持后台运行");
      }
    }

    async function disableBackgroundRun() {
      if (!state.wakeLock) return;
      const lock = state.wakeLock;
      state.wakeLock = null;
      await lock.release().catch(() => {});
    }

    async function realRequest(id) {
      const started = performance.now();
      const response = await fetchWithLocalProxy(buildCompletionUrl(state.settings.url, state.settings.provider), {
        method: "POST",
        headers: buildHeaders(),
        body: JSON.stringify(buildBody(id)),
        signal: state.aborter.signal
      });
      const latency = Math.round(performance.now() - started);
      const text = await response.text();
      let payload = null;
      try {
        payload = text ? JSON.parse(text) : null;
      } catch {
        payload = null;
      }

      if (!response.ok) {
        const detail = payload?.error?.message || payload?.message || text.slice(0, 150) || response.statusText;
        throw new Error(`${response.status} ${detail}`);
      }

      return {
        latency,
        tokens: extractUsageTokens(payload) || estimateTokens(state.settings.prompt) + Math.min(state.settings.maxTokens, 512)
      };
    }

    function buildHeaders() {
      return buildHeadersFor(state.settings);
    }

    function buildHeadersFor(settings) {
      const headers = { "content-type": "application/json" };
      if (settings.provider === "claude") {
        headers["x-api-key"] = settings.apiKey;
        headers["anthropic-version"] = "2023-06-01";
      } else {
        headers.authorization = `Bearer ${settings.apiKey}`;
      }
      return headers;
    }

    function buildBody(id) {
      const prompt = `${state.settings.prompt}\n\n批次编号：${id}\n请尽量展开细节，保持结构化输出。`;
      if (state.settings.provider === "claude") {
        return {
          model: state.settings.model,
          max_tokens: state.settings.maxTokens,
          temperature: state.settings.temperature,
          messages: [{ role: "user", content: prompt }]
        };
      }
      return {
        model: state.settings.model,
        temperature: state.settings.temperature,
        max_tokens: state.settings.maxTokens,
        messages: [
          { role: "system", content: "你是一个用于容量测试的内容生成助手。" },
          { role: "user", content: prompt }
        ]
      };
    }

    function extractUsageTokens(payload) {
      if (!payload || typeof payload !== "object") return 0;
      const usage = payload.usage || {};
      return Number(usage.total_tokens || 0)
        || Number(usage.input_tokens || 0) + Number(usage.output_tokens || 0)
        || Number(usage.prompt_tokens || 0) + Number(usage.completion_tokens || 0)
        || 0;
    }

    function estimateTokens(text) {
      const compact = String(text || "").replace(/\s+/g, "");
      const latinWords = String(text || "").match(/[A-Za-z0-9_]+/g) || [];
      return Math.max(1, Math.ceil(compact.length * 0.75 + latinWords.length * 0.35));
    }

    function registerResult(id, ok, tokens, latency, errorMessage) {
      state.completed += 1;
      if (ok) state.success += 1;
      else state.failed += 1;
      state.totalTokens += tokens;
      state.lastLatency = latency;
      if (latency) state.latencies.push(latency);
      state.samples.push({ time: Date.now(), tokens, latency });
      state.samples = state.samples.slice(-60);

      addEvent(ok ? "OK" : "Error", ok
        ? `#${id} ${formatNumber(tokens)} token / ${formatNumber(latency)}ms`
        : `#${id} ${errorMessage}`, !ok);
      updateMetrics();
      drawChart();
    }

    function updateMetrics() {
      const settings = state.settings.tokenBudget ? state.settings : getSettings();
      const budget = Math.max(settings.tokenBudget || 1, 1);
      const target = Math.max(settings.rounds || 1, 1);
      const avgLatency = state.latencies.length
        ? state.latencies.reduce((sum, item) => sum + item, 0) / state.latencies.length
        : 0;
      const recentTokens = state.samples
        .filter((sample) => sample.time >= Date.now() - 10000)
        .reduce((sum, sample) => sum + sample.tokens, 0);
      const speed = recentTokens / 10;
      const successRate = state.completed ? state.success / state.completed * 100 : 0;

      $("totalTokens").textContent = state.totalTokens ? formatNumber(state.totalTokens) : "-";
      $("budgetText").textContent = `预算 ${formatNumber(budget)}`;
      $("budgetBar").style.width = `${Math.min(100, state.totalTokens / budget * 100)}%`;
      $("throughput").textContent = speed ? `${formatNumber(speed)}/s` : "-";
      $("speedBar").style.width = `${Math.min(100, speed / Math.max(1, settings.maxTokens * settings.concurrency / 2) * 100)}%`;
      $("requestState").textContent = state.completed ? `${formatNumber(state.completed)} 次` : "-";
      $("latencyText").textContent = state.completed
        ? `成功 ${formatNumber(successRate)}% / ${formatNumber(avgLatency)}ms`
        : "延迟 -";
      $("requestBar").style.width = `${Math.min(100, state.completed / target * 100)}%`;
      $("threadNumValue").textContent = String(settings.concurrency || 1);
      syncConcurrencySlider();
    }

    function syncConcurrencySlider() {
      const slider = $("concurrencyRange");
      const min = Number(slider.min) || 0;
      const max = Number(slider.max) || 100;
      const value = Number(slider.value) || min;
      const percent = max > min ? (value - min) / (max - min) * 100 : 0;
      slider.style.setProperty("--slider-percent", `${Math.min(100, Math.max(0, percent))}%`);
    }

    function addEvent(badge, text, isError = false) {
      showTopNotice(badge, text, isError);
    }

    function showTopNotice(badge, text, isError = false) {
      const notice = $("topNotice");
      $("topNoticeTitle").textContent = badge;
      $("topNoticeText").textContent = text;
      notice.classList.toggle("is-error", isError);
      notice.classList.remove("is-visible");
      void notice.offsetWidth;
      notice.classList.add("is-visible");
      notice.setAttribute("aria-hidden", "false");
      clearTimeout(state.noticeTimer);
      state.noticeTimer = setTimeout(() => {
        notice.classList.remove("is-visible");
        notice.setAttribute("aria-hidden", "true");
      }, 2000);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      })[char]);
    }

    function drawChart() {
      if (!window.echarts) return;
      const chartEl = $("liveChart");

      if (!state.chart) state.chart = echarts.init(chartEl, null, { renderer: "canvas" });

      const data = state.samples.length
        ? state.samples.slice(-200).map((sample) => [sample.at, sample.tokens])
        : [[Date.now(), 0]];

      state.chart.setOption({
        tooltip: {
          trigger: "axis",
          formatter(params) {
            const item = params[0];
            return `${new Date(item.data[0]).toLocaleString()}<br />${formatNumber(item.data[1])} Token`;
          }
        },
        title: {
          left: "left",
          text: "Token 图表"
        },
        xAxis: {
          type: "time",
          boundaryGap: false,
          axisLabel: {
            show: false
          },
          axisTick: {
            show: false
          }
        },
        yAxis: {
          type: "value",
          axisLabel: {
            formatter(value) {
              return value ? formatNumber(value) : 0;
            }
          }
        },
        series: [
          {
            name: "Token",
            type: "line",
            smooth: false,
            symbol: "none",
            areaStyle: {},
            data
          }
        ],
        grid: {
          x: 0,
          y: 40,
          x2: 8,
          y2: 10,
          containLabel: true
        }
      }, true);
      state.chart.resize();
    }

    function stopRun() {
      if (!state.running) return;
      state.running = false;
      if (state.aborter) state.aborter.abort();
      finishRun("已停止");
    }

    function finishRun(message) {
      if (!state.running && message !== "已停止") return;
      state.running = false;
      state.aborter = null;
      document.body.classList.remove("running");
      $("runState").textContent = message;
      $("mainAction").setAttribute("aria-label", "启动消耗");
      $("actionText").textContent = "启动消耗";
      setConfigDisabled(false);
      disableBackgroundRun();
      updateMetrics();
      drawChart();
      addEvent("Done", message);
    }

    function resetStats() {
      if (state.running) return;
      state.nextId = 1;
      state.activeWorkers = 0;
      state.completed = 0;
      state.success = 0;
      state.failed = 0;
      state.totalTokens = 0;
      state.lastLatency = 0;
      state.latencies = [];
      state.samples = [];
      updateMetrics();
      drawChart();
    }

    function setConfigDisabled(disabled) {
      providerButtons.forEach((button) => { button.disabled = disabled; });
      [
        "budgetGuard",
        "baseUrl",
        "apiKey",
        "concurrencyRange",
        "concurrency",
        "modelName",
        "rounds",
        "tokenBudget",
        "maxTokens",
        "temperature",
        "intervalMs",
        "method",
        "promptText",
        "fetchModelsBtn",
        "closeSettingsBtn",
        "modelSelectTrigger"
      ].forEach((id) => { $(id).disabled = disabled; });
      $("resetBtn").disabled = disabled;
      syncBudgetInput();
    }

    function syncBudgetInput() {
      $("tokenBudget").disabled = state.running || !$("budgetGuard").checked;
      $("budgetInline").classList.toggle("is-disabled", $("tokenBudget").disabled);
    }

    providerButtons.forEach((button) => {
      button.addEventListener("click", () => setProvider(button.dataset.provider));
    });

    applyTheme(themePreference);

    $("themeToggle").addEventListener("click", () => {
      applyTheme(document.documentElement.classList.contains("dark") ? "light" : "dark");
      drawChart();
    });

    function closeAdvancedPanel() {
      $("advancedPanel").open = false;
    }

    $("mainAction").addEventListener("click", startRun);
    $("resetBtn").addEventListener("click", resetStats);
    $("fetchModelsBtn").addEventListener("click", fetchModels);
    $("closeSettingsBtn").addEventListener("click", closeAdvancedPanel);
    $("closeSettingsIconBtn").addEventListener("click", closeAdvancedPanel);
    $("modelSelectTrigger").addEventListener("click", () => {
      if ($("modelSelectTrigger").disabled) return;
      const widget = $("modelSelectWidget");
      const shouldOpen = !widget.classList.contains("is-open");
      widget.classList.toggle("is-open", shouldOpen);
      $("modelSelectTrigger").setAttribute("aria-expanded", shouldOpen ? "true" : "false");
    });
    $("modelSelectMenu").addEventListener("click", (event) => {
      const option = event.target.closest("[data-model]");
      if (!option) return;
      $("modelName").value = option.dataset.model;
      syncModelSelect();
      closeModelSelect();
    });
    document.addEventListener("click", (event) => {
      if (!$("modelSelectWidget").contains(event.target)) closeModelSelect();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeModelSelect();
    });
    $("chartToggleBtn").addEventListener("click", () => {
      const isOpen = $("chartPanel").classList.toggle("is-visible");
      document.body.classList.toggle("chart-open", isOpen);
      drawChart();
    });
    window.addEventListener("resize", () => {
      if (state.chart) state.chart.resize();
    });
    $("copyUrlBtn").addEventListener("click", async () => {
      const url = getBaseUrlValue();
      if (!url) {
        addEvent("Error", "没有可复制的接口地址", true);
        return;
      }
      try {
        await navigator.clipboard.writeText(url);
        addEvent("Copy", "接口地址已复制");
      } catch {
        addEvent("Copy", url);
      }
    });
    $("backgroundRun").addEventListener("change", () => {
      if (state.running) {
        if ($("backgroundRun").checked) enableBackgroundRun();
        else disableBackgroundRun();
      }
    });
    $("budgetGuard").addEventListener("change", () => {
      syncBudgetInput();
      updateMetrics();
    });
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible" && state.running) enableBackgroundRun();
    });

    $("concurrencyRange").addEventListener("input", () => {
      $("concurrency").value = $("concurrencyRange").value;
      syncConcurrencySlider();
      updateMetrics();
    });
    $("concurrency").addEventListener("input", () => {
      const value = Math.min(20, Math.max(1, Number($("concurrency").value) || 1));
      $("concurrencyRange").value = value;
      syncConcurrencySlider();
      updateMetrics();
    });
    ["rounds", "tokenBudget", "maxTokens"].forEach((id) => {
      $(id).addEventListener("input", updateMetrics);
    });

    updateMetrics();
    syncBudgetInput();
    fillModelOptions([]);
    drawChart();
  </script>
</body>
</html>
