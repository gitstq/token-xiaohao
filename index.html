<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Token 面板</title>
  <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="%235b62f4"/><path d="M18 18h28v8H36v22h-8V26H18z" fill="white"/></svg>'>
  <style>
    :root {
      color-scheme: light;
      --page: #eef7ff;
      --card: #ffffff;
      --text: #344357;
      --title: #526484;
      --info: #909399;
      --primary: #5668ee;
      --primary-soft: #409eff;
      --border: #dbdfea;
      --control: #dcdfe6;
      --danger: #e85347;
      --success: #67c23a;
      --radius-round: 20px;
      font-family: "Segoe UI", "Microsoft YaHei UI", "Microsoft YaHei", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      min-width: 320px;
      margin: 0;
      overflow: hidden;
      color: var(--text);
      background: var(--page);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled,
    input:disabled,
    select:disabled {
      cursor: not-allowed;
      opacity: .62;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    a {
      color: var(--info);
      text-decoration: none;
    }

    a:hover {
      color: var(--primary-soft);
    }

    .topbar {
      height: 67px;
      background-color: #ffffff;
    }

    .top-notice {
      position: fixed;
      top: 82px;
      left: 50%;
      z-index: 50;
      display: grid;
      min-width: min(360px, calc(100vw - 24px));
      max-width: min(520px, calc(100vw - 24px));
      gap: 3px;
      padding: 12px 16px;
      border: 1px solid #fde2e2;
      border-radius: 8px;
      background: #fef0f0;
      color: #e85347;
      box-shadow: 0 14px 40px rgba(82, 100, 132, .18);
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -12px);
      transition: opacity .18s ease, transform .18s ease;
    }

    .top-notice.is-visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .top-notice-title {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.2;
    }

    .top-notice-text {
      color: #606266;
      font-size: 14px;
      line-height: 1.45;
    }

    .header-inner {
      display: flex;
      width: 100%;
      height: 100%;
      align-items: flex-start;
      justify-content: space-between;
      padding: 15px 20px 12px;
    }

    .brand {
      display: flex;
      min-width: 0;
      align-items: center;
      gap: 8px;
    }

    .brand h1 {
      overflow: hidden;
      color: var(--title);
      font-size: 20px;
      font-weight: bolder;
      line-height: 40px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .brand-mark {
      display: grid;
      width: 40px;
      height: 40px;
      flex: 0 0 auto;
      place-items: center;
      border-radius: 20%;
      background-color: var(--primary);
    }

    .brand-mark svg {
      width: 30px;
      height: 30px;
    }

    .top-actions {
      position: relative;
      margin-top: 5px;
    }

    .home {
      min-height: 32px;
      padding: 0 15px;
      border: 1px solid var(--control);
      border-radius: 999px;
      background: #ffffff;
      color: var(--title);
      font-size: 12px;
      line-height: 30px;
      list-style: none;
    }

    .home::-webkit-details-marker,
    summary::-webkit-details-marker {
      display: none;
    }

    .about-panel {
      position: relative;
      z-index: 31;
    }

    .about-popover {
      position: absolute;
      top: 40px;
      right: 0;
      width: min(320px, calc(100vw - 24px));
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #ffffff;
      box-shadow: 0 18px 50px rgba(82, 100, 132, .18);
      color: var(--text);
      font-size: 14px;
      line-height: 1.7;
    }

    .about-popover h2 {
      margin-bottom: 6px;
      color: var(--title);
      font-size: 20px;
    }

    .about-popover a {
      color: var(--primary-soft);
    }

    .page {
      display: grid;
      height: calc(100dvh - 67px);
      grid-template-rows: auto auto auto;
      align-content: start;
      gap: 8px;
      overflow: hidden;
      padding: 20px 10px 10px;
    }

    .console,
    .info-card {
      width: min(850px, 100%);
      height: fit-content;
      margin: 0 auto;
      border-radius: var(--radius-round);
      background-color: var(--card);
      padding: 26px 34px 18px;
    }

    .settings {
      display: grid;
      gap: 10px;
    }

    .title-row {
      display: flex;
      min-height: 22px;
      align-items: center;
      gap: 2px;
      margin-bottom: 3px;
    }

    .font-background {
      color: var(--text);
      font-size: 14px;
    }

    .input,
    .select {
      width: 100%;
      min-height: 32px;
      border: 1px solid var(--control);
      border-radius: 4px;
      outline: 0;
      background-color: #ffffff;
      color: #606266;
      transition: border-color .18s ease, box-shadow .18s ease;
    }

    .input {
      padding: 0 11px;
    }

    .select {
      padding: 0 8px;
    }

    .input:focus,
    .select:focus {
      border-color: var(--primary-soft);
      box-shadow: 0 0 0 2px rgba(64, 158, 255, .12);
    }

    .split {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .mini-main,
    .mini-field {
      display: grid;
      gap: 5px;
      color: var(--text);
      font-size: 14px;
    }

    .mini-field {
      color: #606266;
      font-size: 12px;
      font-weight: 600;
    }

    .model-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 7px;
    }

    .url-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 7px;
    }

    .tiny-btn {
      min-height: 32px;
      padding: 0 12px;
      border: 1px solid var(--control);
      border-radius: 4px;
      background: #ffffff;
      color: #409eff;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    .thread-block {
      display: grid;
      gap: 7px;
      margin-top: 2px;
    }

    input[type="range"] {
      width: 100%;
      height: 18px;
      accent-color: var(--primary-soft);
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    .switches {
      display: flex;
      height: 32px;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .switch-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      font-size: 14px;
      white-space: nowrap;
    }

    .switch {
      position: relative;
      width: 40px;
      height: 20px;
      flex: 0 0 auto;
    }

    .switch input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .track {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: #dcdfe6;
      transition: background .18s ease;
    }

    .track::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 2px 4px rgba(0, 0, 0, .18);
      transition: transform .18s ease;
    }

    .switch input:checked + .track {
      background: var(--primary-soft);
    }

    .switch input:checked + .track::after {
      transform: translateX(20px);
    }

    .ItemContainer {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-top: 10px;
    }

    .showItem {
      min-height: 104px;
      padding: 18px 15px 13px 24px;
      border: 1px solid var(--border);
      background: #ffffff;
    }

    .showItem + .showItem {
      border-left: 0;
    }

    .metric-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      color: var(--text);
      font-size: 17px;
    }

    .state-icon {
      display: block;
      width: 40px;
      height: 24px;
      color: rgb(96, 98, 102);
    }

    .state-icon svg {
      width: 100%;
      height: 100%;
    }

    .state-icon-main {
      color: rgb(9, 194, 222);
    }

    .font-data {
      margin-top: 4px;
      overflow: hidden;
      color: #606266;
      font-size: 28px;
      font-weight: 700;
      line-height: 2.2rem;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .metric-note {
      overflow: hidden;
      color: var(--info);
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .meter {
      height: 3px;
      margin-top: 7px;
      overflow: hidden;
      border-radius: 999px;
      background: #eef2f8;
    }

    .meter span {
      display: block;
      width: 0%;
      height: 100%;
      background: var(--primary-soft);
      transition: width .22s ease;
    }

    .action-zone {
      display: grid;
      justify-items: center;
      padding-top: 12px;
    }

    .main-action {
      position: relative;
      display: grid;
      width: 124px;
      height: 124px;
      place-items: center;
      border-radius: 50%;
      background-color: #485bed;
      background-image: linear-gradient(145deg, #485bed, #6576ff);
      color: #ffffff;
      box-shadow: 0 3px 8px #485bed, inset 0 2px 3px #6576ff;
      transition: transform .18s ease;
    }

    .main-action:hover {
      transform: translateY(-1px);
    }

    .main-action .play {
      width: 0;
      height: 0;
      margin-left: 9px;
      border-top: 22px solid transparent;
      border-bottom: 22px solid transparent;
      border-left: 34px solid currentColor;
    }

    .main-action .stop {
      position: relative;
      display: none;
      width: 52px;
      height: 52px;
    }

    .main-action .stop::before,
    .main-action .stop::after {
      content: "";
      position: absolute;
      top: 4px;
      width: 14px;
      height: 44px;
      border-radius: 4px;
      background: currentColor;
    }

    .main-action .stop::before {
      left: 8px;
    }

    .main-action .stop::after {
      right: 8px;
    }

    body.running .main-action {
      background-color: var(--danger);
      background-image: linear-gradient(145deg, #e85347, #f56c6c);
      box-shadow: 0 3px 8px rgba(232, 83, 71, .75), inset 0 2px 3px rgba(255, 255, 255, .2);
    }

    body.running .main-action .play {
      display: none;
    }

    body.running .main-action .stop {
      display: block;
    }

    .action-text {
      display: none;
    }

    .panel-tools {
      display: flex;
      height: 24px;
      align-items: center;
      justify-content: space-between;
      margin-top: -16px;
    }

    .tool-left {
      display: flex;
      gap: 32px;
    }

    .icon-link {
      display: inline-grid;
      width: 24px;
      height: 24px;
      place-items: center;
      padding: 0;
      background: transparent;
      color: var(--primary-soft);
      list-style: none;
    }

    .icon-link svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .tool-icon {
      width: 26px;
      height: 24px;
    }

    details {
      display: inline-grid;
      justify-items: center;
    }

    details[open] summary {
      color: var(--primary);
    }

    details[open]::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 19;
      background: rgba(238, 247, 255, .62);
      backdrop-filter: blur(2px);
    }

    .advanced {
      position: fixed;
      left: 50%;
      bottom: 14px;
      z-index: 20;
      display: grid;
      width: min(760px, calc(100vw - 24px));
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #ffffff;
      box-shadow: 0 22px 70px rgba(38, 62, 100, .22);
      transform: translateX(-50%);
    }

    .advanced-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .provider-field,
    .prompt-field {
      grid-column: span 2;
    }

    .provider-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }

    .segment {
      min-height: 32px;
      border: 1px solid var(--control);
      border-radius: 4px;
      background: #ffffff;
      color: #606266;
      font-size: 13px;
      font-weight: 600;
      transition: border-color .18s ease, color .18s ease;
    }

    .segment.active {
      border-color: var(--primary-soft);
      color: var(--primary-soft);
    }

    .notice {
      color: #e6a23c;
      font-size: 12px;
      line-height: 1.5;
    }

    .advanced-actions {
      display: flex;
      justify-content: flex-end;
    }

    .sparkline-panel {
      display: none;
      gap: 6px;
      width: 100%;
      margin-top: 8px;
    }

    .sparkline-panel.is-visible {
      display: grid;
    }

    .sparkline-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--info);
      font-size: 12px;
    }

    canvas {
      display: block;
      width: 100%;
      height: 64px;
      border-radius: 8px;
      background:
        linear-gradient(rgba(82, 100, 132, .08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(82, 100, 132, .08) 1px, transparent 1px),
        rgba(244, 248, 253, .8);
      background-size: 100% 50%, 8.33% 100%;
    }

    .info-card {
      display: flex;
      min-height: 48px;
      max-height: 58px;
      align-items: center;
      justify-content: center;
      gap: 10px;
      overflow: hidden;
      text-align: center;
    }

    .status-pill {
      display: inline-flex;
      min-width: 74px;
      height: 24px;
      flex: 0 0 auto;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border-radius: 4px;
      background: #f0f9eb;
      color: var(--success);
      font-size: 12px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
    }

    body.running .status-pill {
      background: #ecf5ff;
      color: var(--primary-soft);
    }

    .event-list {
      display: grid;
      min-width: 0;
      gap: 2px;
      justify-content: start;
      color: var(--text);
      font-size: 12px;
      text-align: left;
    }

    .event {
      display: flex;
      min-width: 0;
      align-items: center;
      gap: 8px;
      line-height: 1.35;
    }

    .event span:last-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .event-badge {
      min-width: 50px;
      border: 1px solid #e1f3d8;
      border-radius: 4px;
      background: #f0f9eb;
      color: var(--success);
      padding: 2px 6px;
      text-align: center;
      font-size: 12px;
    }

    .event-badge.error {
      border-color: #fde2e2;
      background: #fef0f0;
      color: var(--danger);
    }

    .footer {
      display: flex;
      justify-content: center;
      gap: 10px;
      color: var(--info);
      font-size: 13px;
    }

    @media (max-width: 760px) {
      .topbar {
        height: 58px;
      }

      .top-notice {
        top: 66px;
      }

      .header-inner {
        padding: 12px 12px 10px;
      }

      .brand h1 {
        font-size: 18px;
        line-height: 34px;
      }

      .brand-mark {
        width: 34px;
        height: 34px;
      }

      .brand-mark svg {
        width: 26px;
        height: 26px;
      }

      .home {
        min-height: 30px;
        padding: 0 12px;
        line-height: 28px;
      }

      .page {
        height: calc(100dvh - 58px);
        gap: 6px;
        padding: 20px 20px 8px;
      }

      .console,
      .info-card {
        padding: 10px;
        border-radius: 18px;
      }

      .settings {
        gap: 7px;
      }

      .split {
        grid-template-columns: 1fr;
        gap: 7px;
      }

      .font-background,
      .mini-main,
      .switch-label {
        font-size: 12px;
      }

      .title-row {
        margin-bottom: 1px;
      }

      .input,
      .select,
      .tiny-btn {
        min-height: 29px;
        font-size: 12px;
      }

      .thread-block {
        gap: 4px;
      }

      .switches {
        height: 27px;
      }

      .ItemContainer {
        grid-template-columns: 1fr;
        margin-top: 7px;
      }

      .showItem {
        min-height: 76px;
        padding: 8px;
      }

      .showItem + .showItem {
        border-top: 0;
        border-left: 1px solid var(--border);
      }

      .metric-top {
        display: block;
        font-size: 12px;
      }

      .state-icon {
        display: none;
      }

      .font-data {
        margin-top: 4px;
        font-size: 17px;
        line-height: 1.5rem;
      }

      .metric-note {
        font-size: 10px;
      }

      .meter {
        margin-top: 5px;
      }

      .action-zone {
        padding-top: 9px;
      }

      .main-action {
        width: clamp(78px, 12.5vh, 98px);
        height: clamp(78px, 12.5vh, 98px);
      }

      .main-action .play {
        border-top-width: 17px;
        border-bottom-width: 17px;
        border-left-width: 26px;
      }

      .main-action .stop {
        width: 42px;
        height: 42px;
      }

      .main-action .stop::before,
      .main-action .stop::after {
        top: 4px;
        width: 11px;
        height: 34px;
      }

      .panel-tools {
        margin-top: -13px;
      }

      .advanced {
        bottom: 8px;
        padding: 10px;
      }

      .advanced-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 7px;
      }

      .provider-field,
      .prompt-field {
        grid-column: span 2;
      }

      canvas {
        height: 48px;
      }

      .info-card {
        min-height: 44px;
        max-height: 50px;
        gap: 6px;
      }

      .event-list {
        font-size: 11px;
      }

      .event-badge {
        min-width: 42px;
        padding: 1px 4px;
      }

      .footer {
        font-size: 12px;
      }
    }

    @media (max-width: 390px), (max-height: 700px) {
      .console,
      .info-card {
        padding: 6px;
      }

      .page {
        gap: 4px;
        padding: 6px;
      }

      .settings {
        gap: 5px;
      }

      .split {
        gap: 5px;
      }

      .input,
      .select,
      .tiny-btn {
        min-height: 26px;
      }

      .switches {
        height: 24px;
      }

      .font-data {
        font-size: 16px;
        line-height: 1.25rem;
      }

      .metric-note {
        line-height: 1.15;
      }

      .main-action {
        width: 70px;
        height: 70px;
      }

      .showItem {
        min-height: 62px;
        padding: 6px;
      }

      .info-card {
        display: none;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 1024 1024" focusable="false">
            <path d="M568.96 459.242667l144-189.205334A382.208 382.208 0 0 0 512 213.333333c-212.074667 0-384 171.925333-384 384a382.293333 382.293333 0 0 0 93.397333 251.008l-64.554666 55.808A467.584 467.584 0 0 1 42.666667 597.333333C42.666667 338.133333 252.8 128 512 128c93.098667 0 179.861333 27.093333 252.842667 73.856l75.882666-99.690667 67.541334 51.413334-273.28 359.04a149.333333 149.333333 0 1 1-66.048-53.376z m266.453333-69.056l54.357334-71.424A467.242667 467.242667 0 0 1 981.333333 597.333333c0 113.706667-40.64 221.226667-113.237333 305.728l-64.725333-55.616A382.272 382.272 0 0 0 896 597.333333c0-76.288-22.250667-147.370667-60.586667-207.146666zM512 661.333333a64 64 0 1 0 0-128 64 64 0 0 0 0 128z" fill="#ffffff"></path>
          </svg>
        </div>
        <h1>Token 面板</h1>
      </div>
      <div class="top-actions">
        <details class="about-panel">
          <summary class="home">关于</summary>
          <div class="about-popover">
            <h2>Token 面板</h2>
            <p>用于在线消耗闲置 AI Token，支持 GPT、Claude / CC 兼容接口。</p>
            <p>开源地址：<a href="https://github.com/gitstq/token-xiaohao" target="_blank" rel="noopener">token-xiaohao</a></p>
            <p>UI 参考：<a href="https://github.com/ljxi/NetworkPanel" target="_blank" rel="noopener">NetworkPanel</a></p>
          </div>
        </details>
      </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const providerButtons = Array.from(document.querySelectorAll("[data-provider]"));
    const formatNumber = (value) => Math.round(value || 0).toLocaleString("zh-CN");
    const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

    const defaults = {
      openai: {
        url: "https://api.openai.com/v1",
        model: ""
      },
      claude: {
        url: "https://api.anthropic.com/v1",
        model: ""
      },
      custom: {
        url: "https://example.com/v1",
        model: ""
      }
    };

    const state = {
      provider: "openai",
      running: false,
      aborter: null,
      nextId: 1,
      activeWorkers: 0,
      completed: 0,
      success: 0,
      failed: 0,
      totalTokens: 0,
      lastLatency: 0,
      latencies: [],
      samples: [],
      events: [],
      settings: {},
      noticeTimer: null
    };

    function getSettings() {
      return {
        provider: state.provider,
        budgetGuard: $("budgetGuard").checked,
        url: $("baseUrl").value.trim(),
        apiKey: $("apiKey").value.trim(),
        model: $("modelName").value.trim(),
        temperature: Number($("temperature").value),
        maxTokens: Number($("maxTokens").value),
        rounds: Number($("rounds").value),
        concurrency: Number($("concurrency").value),
        tokenBudget: Number($("tokenBudget").value),
        intervalMs: Number($("intervalMs").value),
        prompt: $("promptText").value.trim()
      };
    }

    function setProvider(provider) {
      state.provider = provider;
      providerButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.provider === provider);
      });
      $("baseUrl").value = defaults[provider].url;
      $("modelName").value = defaults[provider].model;
      addEvent("Mode", `接口已切换为 ${provider === "openai" ? "GPT" : provider === "claude" ? "Claude / CC" : "自定义"}`);
    }

    function validateSettings(settings) {
      if (!settings.url) return "请先填写 URL";
      try {
        new URL(settings.url);
      } catch {
        return "URL 格式不正确";
      }
      if (!settings.apiKey) return "请先填写 KEY";
      if (!settings.model) return "请先填写或选择模型 ID";
      if (!settings.prompt) return "提示词不能为空";
      if (!Number.isFinite(settings.rounds) || settings.rounds < 1) return "轮次必须大于 0";
      if (!Number.isFinite(settings.concurrency) || settings.concurrency < 1) return "线程数必须大于 0";
      if (!Number.isFinite(settings.tokenBudget) || settings.tokenBudget < 100) return "Token 预算至少为 100";
      if (!Number.isFinite(settings.maxTokens) || settings.maxTokens < 16) return "单次输出至少为 16";
      return "";
    }

    function buildModelUrl(url) {
      const parsed = new URL(url);
      const path = parsed.pathname.replace(/\/+$/, "");
      if (/\/chat\/completions$/i.test(path)) {
        parsed.pathname = path.replace(/\/chat\/completions$/i, "/models");
      } else if (/\/messages$/i.test(path)) {
        parsed.pathname = path.replace(/\/messages$/i, "/models");
      } else if (!/\/models$/i.test(path)) {
        parsed.pathname = path.endsWith("/v1") ? `${path}/models` : `${path}/v1/models`;
      }
      parsed.search = "";
      parsed.hash = "";
      return parsed.toString();
    }

    function buildCompletionUrl(url, provider) {
      const parsed = new URL(url);
      const path = parsed.pathname.replace(/\/+$/, "");
      parsed.search = "";
      parsed.hash = "";
      if (/\/chat\/completions$/i.test(path) || /\/messages$/i.test(path)) return parsed.toString();
      if (provider === "claude") {
        parsed.pathname = path.endsWith("/v1") ? `${path}/messages` : `${path}/v1/messages`;
      } else {
        parsed.pathname = path.endsWith("/v1") ? `${path}/chat/completions` : `${path}/v1/chat/completions`;
      }
      return parsed.toString();
    }

    async function fetchModels() {
      if (state.running) return;
      const settings = getSettings();
      if (!settings.url) {
        addEvent("Error", "请先填写 URL", true);
        return;
      }
      if (!settings.apiKey) {
        addEvent("Error", "获取模型需要填写 KEY", true);
        return;
      }

      $("fetchModelsBtn").disabled = true;
      $("fetchModelsBtn").textContent = "获取中";
      try {
        const response = await fetch(buildModelUrl(settings.url), {
          method: "GET",
          headers: buildHeadersFor(settings),
          signal: AbortSignal.timeout ? AbortSignal.timeout(15000) : undefined
        });
        const payload = await response.json().catch(() => null);
        if (!response.ok) {
          const detail = payload?.error?.message || payload?.message || response.statusText;
          throw new Error(`${response.status} ${detail}`);
        }
        const models = normalizeModels(payload);

        if (!models.length) throw new Error("没有解析到模型 ID");
        fillModelOptions(models);
        $("modelName").value = models[0];
        $("advancedPanel").open = false;
        addEvent("Models", `已获取 ${models.length} 个模型`);
      } catch (error) {
        const message = error && error.message ? error.message : String(error);
        addEvent("Error", `获取模型失败：${message}`, true);
      } finally {
        $("fetchModelsBtn").disabled = false;
        $("fetchModelsBtn").textContent = "获取模型";
      }
    }

    function normalizeModels(payload) {
      const list = Array.isArray(payload?.data) ? payload.data
        : Array.isArray(payload?.models) ? payload.models
        : Array.isArray(payload) ? payload
        : [];
      return [...new Set(list.map((item) => {
        if (typeof item === "string") return item;
        return item?.id || item?.name || item?.model || "";
      }).filter(Boolean))];
    }

    function fillModelOptions(models) {
      const options = models.length
        ? models.map((model) => `<option value="${escapeHtml(model)}">${escapeHtml(model)}</option>`).join("")
        : '<option value="">请先获取模型</option>';
      $("modelName").innerHTML = options;
    }

    async function startRun() {
      if (state.running) return stopRun();
      const settings = getSettings();
      const validation = validateSettings(settings);
      if (validation) {
        addEvent("Error", validation, true);
        return;
      }

      state.settings = settings;
      state.running = true;
      state.aborter = new AbortController();
      state.nextId = 1;
      state.activeWorkers = 0;
      state.completed = 0;
      state.success = 0;
      state.failed = 0;
      state.totalTokens = 0;
      state.lastLatency = 0;
      state.latencies = [];
      state.samples = [];
      state.events = [];

      document.body.classList.add("running");
      $("runState").textContent = "真实运行中";
      $("mainAction").setAttribute("aria-label", "停止消耗");
      $("actionText").textContent = "停止消耗";
      setConfigDisabled(true);
      updateMetrics();
      drawChart();
      addEvent("Start", `${settings.rounds} 轮 / ${settings.concurrency} 线程`);

      const workers = Array.from({ length: settings.concurrency }, (_, index) => runWorker(index + 1));
      await Promise.allSettled(workers);
      const stoppedByBudget = settings.budgetGuard && state.totalTokens >= settings.tokenBudget;
      finishRun(stoppedByBudget ? "达到预算" : "运行结束");
    }

    async function runWorker(workerId) {
      while (state.running) {
        const id = state.nextId++;
        const budgetHit = state.settings.budgetGuard && state.totalTokens >= state.settings.tokenBudget;
        if (id > state.settings.rounds || budgetHit) break;
        state.activeWorkers += 1;
        updateMetrics();

        try {
          const result = await realRequest(id);
          registerResult(id, true, result.tokens, result.latency, "");
        } catch (error) {
          const message = error && error.message ? error.message : String(error);
          registerResult(id, false, 0, state.lastLatency, message);
        } finally {
          state.activeWorkers -= 1;
          updateMetrics();
        }

        if (state.settings.intervalMs > 0) await sleep(state.settings.intervalMs);
      }
    }

    async function realRequest(id) {
      const started = performance.now();
      const response = await fetch(buildCompletionUrl(state.settings.url, state.settings.provider), {
        method: "POST",
        headers: buildHeaders(),
        body: JSON.stringify(buildBody(id)),
        signal: state.aborter.signal
      });
      const latency = Math.round(performance.now() - started);
      const text = await response.text();
      let payload = null;
      try {
        payload = text ? JSON.parse(text) : null;
      } catch {
        payload = null;
      }

      if (!response.ok) {
        const detail = payload?.error?.message || payload?.message || text.slice(0, 150) || response.statusText;
        throw new Error(`${response.status} ${detail}`);
      }

      return {
        latency,
        tokens: extractUsageTokens(payload) || estimateTokens(state.settings.prompt) + Math.min(state.settings.maxTokens, 512)
      };
    }

    function buildHeaders() {
      return buildHeadersFor(state.settings);
    }

    function buildHeadersFor(settings) {
      const headers = { "content-type": "application/json" };
      if (settings.provider === "claude") {
        headers["x-api-key"] = settings.apiKey;
        headers["anthropic-version"] = "2023-06-01";
      } else {
        headers.authorization = `Bearer ${settings.apiKey}`;
      }
      return headers;
    }

    function buildBody(id) {
      const prompt = `${state.settings.prompt}\n\n批次编号：${id}\n请尽量展开细节，保持结构化输出。`;
      if (state.settings.provider === "claude") {
        return {
          model: state.settings.model,
          max_tokens: state.settings.maxTokens,
          temperature: state.settings.temperature,
          messages: [{ role: "user", content: prompt }]
        };
      }
      return {
        model: state.settings.model,
        temperature: state.settings.temperature,
        max_tokens: state.settings.maxTokens,
        messages: [
          { role: "system", content: "你是一个用于容量测试的内容生成助手。" },
          { role: "user", content: prompt }
        ]
      };
    }

    function extractUsageTokens(payload) {
      if (!payload || typeof payload !== "object") return 0;
      const usage = payload.usage || {};
      return Number(usage.total_tokens || 0)
        || Number(usage.input_tokens || 0) + Number(usage.output_tokens || 0)
        || Number(usage.prompt_tokens || 0) + Number(usage.completion_tokens || 0)
        || 0;
    }

    function estimateTokens(text) {
      const compact = String(text || "").replace(/\s+/g, "");
      const latinWords = String(text || "").match(/[A-Za-z0-9_]+/g) || [];
      return Math.max(1, Math.ceil(compact.length * 0.75 + latinWords.length * 0.35));
    }

    function registerResult(id, ok, tokens, latency, errorMessage) {
      state.completed += 1;
      if (ok) state.success += 1;
      else state.failed += 1;
      state.totalTokens += tokens;
      state.lastLatency = latency;
      if (latency) state.latencies.push(latency);
      state.samples.push({ time: Date.now(), tokens, latency });
      state.samples = state.samples.slice(-60);

      addEvent(ok ? "OK" : "Error", ok
        ? `#${id} ${formatNumber(tokens)} token / ${formatNumber(latency)}ms`
        : `#${id} ${errorMessage}`, !ok);
      updateMetrics();
      drawChart();
    }

    function updateMetrics() {
      const settings = state.settings.tokenBudget ? state.settings : getSettings();
      const budget = Math.max(settings.tokenBudget || 1, 1);
      const target = Math.max(settings.rounds || 1, 1);
      const avgLatency = state.latencies.length
        ? state.latencies.reduce((sum, item) => sum + item, 0) / state.latencies.length
        : 0;
      const recentTokens = state.samples
        .filter((sample) => sample.time >= Date.now() - 10000)
        .reduce((sum, sample) => sum + sample.tokens, 0);
      const speed = recentTokens / 10;
      const successRate = state.completed ? state.success / state.completed * 100 : 0;

      $("totalTokens").textContent = state.totalTokens ? formatNumber(state.totalTokens) : "-";
      $("budgetText").textContent = `预算 ${formatNumber(budget)}`;
      $("budgetBar").style.width = `${Math.min(100, state.totalTokens / budget * 100)}%`;
      $("throughput").textContent = speed ? `${formatNumber(speed)}/s` : "-";
      $("speedBar").style.width = `${Math.min(100, speed / Math.max(1, settings.maxTokens * settings.concurrency / 2) * 100)}%`;
      $("requestState").textContent = state.completed ? `${formatNumber(state.completed)} 次` : "-";
      $("latencyText").textContent = state.completed
        ? `成功 ${formatNumber(successRate)}% / ${formatNumber(avgLatency)}ms`
        : "延迟 -";
      $("requestBar").style.width = `${Math.min(100, state.completed / target * 100)}%`;
      $("activeWorkers").textContent = `并发 ${state.activeWorkers}`;
      $("threadNumValue").textContent = String(settings.concurrency || 1);
    }

    function addEvent(badge, text, isError = false) {
      state.events.unshift({ badge, text, isError });
      state.events = state.events.slice(0, 3);
      $("eventList").innerHTML = state.events.map((item) => `
        <div class="event">
          <span class="event-badge ${item.isError ? "error" : ""}">${escapeHtml(item.badge)}</span>
          <span>${escapeHtml(item.text)}</span>
        </div>
      `).join("");
      if (isError) showTopNotice(badge, text);
    }

    function showTopNotice(badge, text) {
      $("topNoticeTitle").textContent = badge;
      $("topNoticeText").textContent = text;
      $("topNotice").classList.add("is-visible");
      $("topNotice").setAttribute("aria-hidden", "false");
      clearTimeout(state.noticeTimer);
      state.noticeTimer = setTimeout(() => {
        $("topNotice").classList.remove("is-visible");
        $("topNotice").setAttribute("aria-hidden", "true");
      }, 3600);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      })[char]);
    }

    function drawChart() {
      const canvas = $("liveChart");
      const ctx = canvas.getContext("2d");
      const width = canvas.width;
      const height = canvas.height;
      const pad = 12;
      ctx.clearRect(0, 0, width, height);

      if (!state.samples.length) {
        ctx.fillStyle = "#9aa7ba";
        ctx.font = "13px Segoe UI";
        ctx.fillText("启动后显示实时曲线", pad, height / 2 + 4);
        return;
      }

      const samples = state.samples.slice(-34);
      const maxTokens = Math.max(...samples.map((sample) => sample.tokens), 1);
      const step = samples.length > 1 ? (width - pad * 2) / (samples.length - 1) : width - pad * 2;

      ctx.beginPath();
      samples.forEach((sample, index) => {
        const x = pad + index * step;
        const y = height - pad - sample.tokens / maxTokens * (height - pad * 2);
        if (index === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.strokeStyle = "#4096ff";
      ctx.lineWidth = 3;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.stroke();

      const last = samples[samples.length - 1];
      const x = pad + (samples.length - 1) * step;
      const y = height - pad - last.tokens / maxTokens * (height - pad * 2);
      ctx.fillStyle = "#08bfd8";
      ctx.beginPath();
      ctx.arc(x, y, 4, 0, Math.PI * 2);
      ctx.fill();
    }

    function stopRun() {
      if (!state.running) return;
      state.running = false;
      if (state.aborter) state.aborter.abort();
      finishRun("已停止");
    }

    function finishRun(message) {
      if (!state.running && message !== "已停止") return;
      state.running = false;
      state.aborter = null;
      document.body.classList.remove("running");
      $("runState").textContent = message;
      $("mainAction").setAttribute("aria-label", "启动消耗");
      $("actionText").textContent = "启动消耗";
      setConfigDisabled(false);
      updateMetrics();
      drawChart();
      addEvent("Done", message);
    }

    function resetStats() {
      if (state.running) return;
      state.nextId = 1;
      state.activeWorkers = 0;
      state.completed = 0;
      state.success = 0;
      state.failed = 0;
      state.totalTokens = 0;
      state.lastLatency = 0;
      state.latencies = [];
      state.samples = [];
      state.events = [];
      $("eventList").innerHTML = '<div class="event"><span class="event-badge">Ready</span><span>填写 URL / KEY 后获取模型并开始消耗</span></div>';
      updateMetrics();
      drawChart();
    }

    function setConfigDisabled(disabled) {
      providerButtons.forEach((button) => { button.disabled = disabled; });
      [
        "budgetGuard",
        "baseUrl",
        "apiKey",
        "concurrencyRange",
        "concurrency",
        "modelName",
        "rounds",
        "tokenBudget",
        "maxTokens",
        "temperature",
        "intervalMs",
        "method",
        "promptText",
        "fetchModelsBtn",
        "closeSettingsBtn"
      ].forEach((id) => { $(id).disabled = disabled; });
      $("resetBtn").disabled = disabled;
    }

    providerButtons.forEach((button) => {
      button.addEventListener("click", () => setProvider(button.dataset.provider));
    });

    $("mainAction").addEventListener("click", startRun);
    $("resetBtn").addEventListener("click", resetStats);
    $("fetchModelsBtn").addEventListener("click", fetchModels);
    $("closeSettingsBtn").addEventListener("click", () => { $("advancedPanel").open = false; });
    $("settingsTrigger").addEventListener("click", () => {
      $("advancedPanel").open = !$("advancedPanel").open;
    });
    $("chartToggleBtn").addEventListener("click", () => {
      $("chartPanel").classList.toggle("is-visible");
      drawChart();
    });
    $("copyUrlBtn").addEventListener("click", async () => {
      const url = $("baseUrl").value.trim();
      if (!url) {
        addEvent("Error", "没有可复制的接口地址", true);
        return;
      }
      try {
        await navigator.clipboard.writeText(url);
        addEvent("Copy", "接口地址已复制");
      } catch {
        addEvent("Copy", url);
      }
    });
    $("autoModels").addEventListener("change", () => {
      if ($("autoModels").checked && $("baseUrl").value.trim() && $("apiKey").value.trim()) fetchModels();
    });
    $("baseUrl").addEventListener("change", () => {
      if ($("autoModels").checked && $("apiKey").value.trim()) fetchModels();
    });
    $("apiKey").addEventListener("change", () => {
      if ($("autoModels").checked && $("baseUrl").value.trim()) fetchModels();
    });

    $("concurrencyRange").addEventListener("input", () => {
      $("concurrency").value = $("concurrencyRange").value;
      updateMetrics();
    });
    $("concurrency").addEventListener("input", () => {
      const value = Math.min(20, Math.max(1, Number($("concurrency").value) || 1));
      $("concurrencyRange").value = value;
      updateMetrics();
    });
    ["rounds", "tokenBudget", "maxTokens"].forEach((id) => {
      $(id).addEventListener("input", updateMetrics);
    });

    updateMetrics();
    fillModelOptions([]);
    drawChart();
  </script>
</body>
</html>
